<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - INFOTESS SDMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="section">
        <div class="form-container" style="text-align: center;">
            <img src="images/infotess.png" alt="INFOTESS Logo" style="width: 100px; margin-bottom: 20px;">
            <h2 class="section-title">Login to SDMS</h2>
            
            <div id="alert-message" class="alert" style="display: none;"></div>
            
            <form id="login-form" style="text-align: left;">
                <div class="form-group">
                    <label for="identifier">Username (Index Number) / Email Address</label>
                    <input type="text" name="identifier" id="identifier" class="form-control" required placeholder="Enter your index number (username) or email address" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" class="form-control" required placeholder="Enter Password" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-submit" id="submit-btn">Login</button>
                
                <div style="margin-top: 15px; text-align: center;">
                    <a href="forgot-password.html" style="color: var(--primary-color);">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const alertBox = document.getElementById('alert-message');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/v2/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || 'Invalid credentials.');
                }

                // Save token and user info
                if (result.token) {
                    localStorage.setItem('infotess_token', result.token);
                    localStorage.setItem('infotess_user', JSON.stringify(result.user));
                }

                let redirectTarget = String(result.redirect || '').replace('.php', '.html');
                if (!redirectTarget) {
                    const isStudent = result.user && result.user.role === 'student';
                    if (isStudent && result.requires_password_reset) {
                        redirectTarget = 'student/password-reset.html';
                    } else if (isStudent && !result.is_profile_complete) {
                        redirectTarget = 'student/profile.html';
                    } else if (isStudent) {
                        redirectTarget = 'student/dashboard.html';
                    } else {
                        redirectTarget = 'admin/dashboard.html';
                    }
                }
                window.location.href = redirectTarget;
                
            } catch (error) {
                alertBox.style.display = 'block';
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = error.message || 'Invalid credentials.';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
