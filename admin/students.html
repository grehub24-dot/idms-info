<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - INFOTESS SDMS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .skeleton { background: #eee; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); background-size: 200% 100%; animation: 1.5s shine linear infinite; }
        @keyframes shine { to { background-position-x: -200%; } }
        @media screen and (max-width: 992px) {
            .sidebar { display: none; }
            .sidebar.active { display: block; position: fixed; left: 0; top: 0; height: 100vh; z-index: 1001; }
            .hamburger-dashboard { display: block !important; }
        }
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .toolbar input[type="text"] { flex: 1; min-width: 220px; }
        .table-actions a { margin-right: 8px; }
    </style>
    <script>
        function debounce(fn, wait) {
            let t;
            return function(...args) {
                clearTimeout(t);
                t = setTimeout(() => fn.apply(this, args), wait);
            };
        }
    </script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header" style="text-align: center; padding: 20px 10px;">
                <img src="../images/infotess.png" alt="INFOTESS Logo" style="width: 80px; height: 80px; margin-bottom: 10px; border-radius: 50%; background: #fff; padding: 5px;">
                <h3>INFOTESS Admin</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="students" class="active"><i class="fas fa-user-graduate"></i> Students</a></li>
                <li><a href="payments"><i class="fas fa-money-bill-wave"></i> Payments</a></li>
                <li><a href="reports"><i class="fas fa-chart-bar"></i> Reports</a></li>
                <li><a href="verify"><i class="fas fa-qrcode"></i> Verify Receipt</a></li>
                <li><a href="users"><i class="fas fa-users-cog"></i> User Management</a></li>
                <li><a href="messaging"><i class="fas fa-envelope"></i> Messaging</a></li>
                <li><a href="inbox"><i class="fas fa-inbox"></i> Inbox</a></li>
                <li><a href="module_settings"><i class="fas fa-cogs"></i> Module Settings</a></li>
                <li><a href="settings"><i class="fas fa-tools"></i> System Settings</a></li>
                <li><a href="../logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="top-bar" style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Student Management</h2>
                <div style="display:flex; gap:10px; align-items:center;">
                    <button id="openModalBtnTop" class="btn-primary" style="padding: 10px 20px;"><i class="fas fa-plus"></i> Add New Student</button>
                    <div class="hamburger-dashboard" style="display: none; cursor: pointer; font-size: 1.5rem;">
                        <i class="fas fa-bars"></i>
                    </div>
                </div>
            </div>

            <div id="error-message" style="display:none;" class="alert alert-danger"></div>

            <div class="section" style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <div class="toolbar">
                    <input type="text" id="search" class="form-control" placeholder="Search name or index...">
                    <select id="limit" class="form-control" style="width: 120px;">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                        <option value="200">200</option>
                    </select>
                    <button id="refresh" class="btn-login" style="padding: 10px 14px;"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
            </div>

            <div class="section" style="background: white; padding: 20px; border-radius: 8px;">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Index Number</th>
                                <th>Name</th>
                                <th>Programme</th>
                                <th>Level</th>
                                <th>Class</th>
                                <th>Stream</th>
                                <th>Contact</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-tbody">
                            <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="modal-overlay" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
                <div id="modal" style="background: #fff; width: 95%; max-width: 700px; border-radius: 8px; overflow: hidden;">
                    <div style="padding: 15px 20px; border-bottom: 1px solid #eee; display:flex; align-items:center; justify-content:space-between;">
                        <h3 style="margin:0;">Add Student</h3>
                        <button id="modal-close" style="border:none; background:none; font-size: 1.2rem; cursor: pointer;">×</button>
                    </div>
                    <div style="padding: 20px;">
                        <div id="modal-error" class="alert alert-danger" style="display:none;"></div>
                        <form id="create-form" style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div style="grid-column: span 2; text-align: center; margin-bottom: 10px;">
                                <label>Profile Picture</label><br>
                                <input type="file" name="profile_picture" class="form-control" accept="image/*">
                            </div>
                            <div>
                                <label>Full Name</label>
                                <input type="text" name="full_name" class="form-control" required>
                            </div>
                            <div>
                                <label>Index Number</label>
                                <input type="text" name="index_number" class="form-control" required>
                            </div>
                            <div>
                                <label>Programme / Department</label>
                                <select name="department" class="form-control" required>
                                    <option value="">-- Select Programme --</option>
                                    <optgroup label="Bachelor's Degree Programmes">
                                        <option value="B.Sc. Information Technology">B.Sc. Information Technology</option>
                                        <option value="B.Sc. Cyber Security and Digital Forensics">B.Sc. Cyber Security and Digital Forensics</option>
                                        <option value="B.Ed. Computing with Artificial Intelligence (AI)">B.Ed. Computing with Artificial Intelligence (AI)</option>
                                        <option value="B.Ed. Computing with Internet of Things (IOT)">B.Ed. Computing with Internet of Things (IOT)</option>
                                        <option value="B.Ed. Information Technology">B.Ed. Information Technology</option>
                                    </optgroup>
                                    <optgroup label="Diploma Programmes">
                                        <option value="Diploma in Cyber Security and Digital Forensics">Diploma in Cyber Security and Digital Forensics</option>
                                        <option value="Diploma in Information Technology">Diploma in Information Technology</option>
                                    </optgroup>
                                    <optgroup label="Postgraduate Programmes">
                                        <option value="M. Phil. Information Technology">M. Phil. Information Technology</option>
                                        <option value="M. Sc. Information Technology Education">M. Sc. Information Technology Education</option>
                                        <option value="M. Phil Information Technology (Top-up)">M. Phil Information Technology (Top-up)</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div>
                                <label>Level</label>
                                <select name="level" class="form-control" required>
                                    <option value="100">100</option>
                                    <option value="200">200</option>
                                    <option value="300">300</option>
                                    <option value="400">400</option>
                                </select>
                            </div>
                            <div>
                                <label>Email</label>
                                <input type="email" name="email" class="form-control">
                            </div>
                            <div>
                                <label>Phone</label>
                                <input type="text" name="phone" class="form-control">
                            </div>
                            <div>
                                <label>Class</label>
                                <select name="class_name" class="form-control">
                                    <option value="">-- Select Class --</option>
                                    <optgroup label="IT">
                                        <option>IT A</option><option>IT B</option><option>IT C</option><option>IT D</option>
                                        <option>IT E</option><option>IT F</option><option>IT G</option><option>IT H</option>
                                    </optgroup>
                                    <optgroup label="ITE">
                                        <option>ITE A</option><option>ITE B</option><option>ITE C</option><option>ITE D</option>
                                        <option>ITE E</option><option>ITE F</option><option>ITE G</option><option>ITE H</option>
                                        <option>ITE I</option><option>ITE J</option><option>ITE K</option>
                                    </optgroup>
                                    <optgroup label="CB">
                                        <option>CB A</option><option>CB B</option><option>CB C</option><option>CB D</option>
                                        <option>CB E</option><option>CB F</option><option>CB G</option><option>CB H</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div>
                                <label>Stream</label>
                                <select name="stream" class="form-control">
                                    <option value="">-- Select Stream --</option>
                                    <option>Regular</option>
                                    <option>Sandwich</option>
                                    <option>Evening</option>
                                </select>
                            </div>
                            <div>
                                <label>Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div></div>
                            <div style="grid-column: 1 / -1; display:flex; gap:10px; justify-content:flex-end; margin-top: 5px;">
                                <button type="button" id="modal-cancel" class="btn-secondary" style="padding:10px 14px;">Cancel</button>
                                <button type="submit" class="btn-login" style="padding:10px 14px;">Create</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('infotess_token');
            if (!token) {
                window.location.href = '../login.html';
                return;
            }

            const tbody = document.getElementById('students-tbody');
            const searchInput = document.getElementById('search');
            const limitSelect = document.getElementById('limit');
            const refreshBtn = document.getElementById('refresh');
            const errorBox = document.getElementById('error-message');
            const addBtnTop = document.getElementById('openModalBtnTop');
            const overlay = document.getElementById('modal-overlay');
            const modalClose = document.getElementById('modal-close');
            const modalCancel = document.getElementById('modal-cancel');
            const modalError = document.getElementById('modal-error');
            const createForm = document.getElementById('create-form');

            function renderRows(rows) {
                if (!rows || rows.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">No students found.</td></tr>';
                    return;
                }
                tbody.innerHTML = rows.map(s => {
                    const imgSrc = s.profile_picture ? ('../' + s.profile_picture) : '../images/user-placeholder.png';
                    return `
                        <tr>
                            <td><img src="${imgSrc}" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd;"></td>
                            <td>${s.index_number || ''}</td>
                            <td>${s.full_name || ''}</td>
                            <td>${s.department || ''}</td>
                            <td>${s.level || ''}</td>
                            <td>${s.class_name || ''}</td>
                            <td>${s.stream || ''}</td>
                            <td>${s.phone || ''}</td>
                            <td>
                                <a href="edit-student?id=${encodeURIComponent(s.student_id)}" class="btn-secondary" style="padding:6px 10px; font-size:0.85rem;"><i class="fas fa-edit"></i> Edit</a>
                                <a href="#" data-id="${s.student_id}" class="btn-danger delete-btn" style="padding:6px 10px; font-size:0.85rem; margin-left:6px;"><i class="fas fa-trash"></i> Delete</a>
                            </td>
                        </tr>
                    `;
                }).join('');
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const id = btn.getAttribute('data-id');
                        if (!id) return;
                        if (!confirm('Delete this student? This will also delete the linked user.')) return;
                        fetch('/api/admin/students_delete.php?id=' + encodeURIComponent(id), {
                            method: 'DELETE',
                            headers: { Authorization: `Bearer ${token}` }
                        })
                        .then(async res => {
                            const data = await res.json().catch(() => ({}));
                            if (!res.ok || !data.ok) {
                                throw new Error(data.error || `Delete failed with status ${res.status}`);
                            }
                            return data;
                        })
                        .then(() => fetchStudents())
                        .catch(err => {
                            errorBox.style.display = 'block';
                            errorBox.textContent = err.message || 'Failed to delete student.';
                        });
                    });
                });
            }

            function fetchStudents() {
                const q = encodeURIComponent(searchInput.value.trim());
                const limit = encodeURIComponent(limitSelect.value);
                const url = `/api/admin/students_list.php?limit=${limit}${q ? `&q=${q}` : ''}`;
                return fetch(url, {
                    headers: { Authorization: `Bearer ${token}` }
                })
                .then(async res => {
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok || !data.ok) {
                        throw new Error(data.error || `Request failed with status ${res.status}`);
                    }
                    return data;
                })
                .then(data => renderRows(data.students))
                .catch(err => {
                    errorBox.style.display = 'block';
                    errorBox.textContent = err.message || 'Failed to load students.';
                });
            }

            const debouncedSearch = debounce(fetchStudents, 300);
            searchInput.addEventListener('input', debouncedSearch);
            limitSelect.addEventListener('change', fetchStudents);
            refreshBtn.addEventListener('click', fetchStudents);

            fetchStudents();

            const hamburger = document.querySelector('.hamburger-dashboard');
            const sidebar = document.querySelector('.sidebar');
            if (hamburger && sidebar) {
                hamburger.addEventListener('click', () => {
                    sidebar.classList.toggle('active');
                });
            }

            function openModal() {
                modalError.style.display = 'none';
                modalError.textContent = '';
                createForm.reset();
                overlay.style.display = 'flex';
            }
            function closeModal() {
                overlay.style.display = 'none';
            }
            addBtnTop.addEventListener('click', openModal);
            modalClose.addEventListener('click', closeModal);
            modalCancel.addEventListener('click', closeModal);

            createForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const fd = new FormData(createForm);
                const payload = {
                    full_name: fd.get('full_name'),
                    index_number: fd.get('index_number'),
                    department: fd.get('department'),
                    level: fd.get('level'),
                    email: fd.get('email') || null,
                    phone: fd.get('phone') || null,
                    class_name: fd.get('class_name') || '',
                    stream: fd.get('stream') || '',
                    password: fd.get('password')
                };
                const btns = createForm.querySelectorAll('button');
                btns.forEach(b => b.disabled = true);
                fetch('/api/admin/students_create.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                })
                .then(async res => {
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok || !data.ok) {
                        throw new Error(data.error || `Request failed with status ${res.status}`);
                    }
                    return data;
                })
                .then(() => {
                    closeModal();
                    fetchStudents();
                })
                .catch(err => {
                    modalError.style.display = 'block';
                    modalError.textContent = err.message || 'Failed to create student.';
                })
                .finally(() => {
                    btns.forEach(b => b.disabled = false);
                });
            });
        });
    </script>
</body>
</html>
