<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging Out - INFOTESS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: Arial, sans-serif;">
        <img src="images/infotess.png" alt="INFOTESS Logo" style="width: 100px; margin-bottom: 20px;">
        <h2>Logging out...</h2>
        <p>Please wait while we securely end your session.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('api/auth/logout', { method: 'POST' })
                .then(() => {
                    // Clear user data from local storage
                    localStorage.removeItem('infotess_token');
                    localStorage.removeItem('infotess_user');
                    // Redirect to login page after successful logout
                    window.location.href = 'login.html';
                })
                .catch(() => {
                    // Even if the server logout fails, clear local storage and redirect
                    localStorage.removeItem('infotess_token');
                    localStorage.removeItem('infotess_user');
                    window.location.href = 'login.html';
                });
        });
    </script>
</body>
</html>
