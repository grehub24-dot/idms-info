<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - INFOTESS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="hero" style="height: 50vh;">
        <h1>Gallery</h1>
        <p>Photos from our recent events and student life.</p>
    </div>

    <div class="section">
        <div class="container">
            <div class="card-grid" id="gallery-container">
                <p style="text-align: center; width: 100%;">Loading gallery...</p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('api/public/gallery.php')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('gallery-container');
                    if (data.ok && data.gallery && data.gallery.length > 0) {
                        let html = '';
                        data.gallery.forEach(item => {
                            html += `
                                <div class="card gallery-item">
                                    <img src="${item.image_url.replace(/"/g, '&quot;')}" alt="${item.title.replace(/"/g, '&quot;')}" style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px 8px 0 0;">
                                    <div class="card-content">
                                        <h4 class="card-title">${item.title.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</h4>
                                        <p><small>${(item.category || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</small></p>
                                    </div>
                                </div>
                            `;
                        });
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = '<p style="text-align: center; width: 100%;">Our gallery is being updated. Check back soon!</p>';
                    }
                })
                .catch(err => {
                    document.getElementById('gallery-container').innerHTML = '<p style="text-align: center; width: 100%;">Error loading gallery.</p>';
                });
        });
    </script>
</body>
</html>
