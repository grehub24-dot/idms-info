<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password - INFOTESS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #f4f4f4;">
    <div id="header-placeholder"></div>

    <div class="section" style="padding: 60px 20px; min-height: 60vh; display: flex; align-items: center; justify-content: center;">
        <div class="form-container" style="max-width: 500px; width: 100%; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <h2 class="section-title" style="text-align: center; margin-bottom: 10px; color: #333;">Reset Your Password</h2>
            <p style="text-align: center; margin-bottom: 30px; color: #666; font-size: 14px;">You are using a temporal password. Please set a new password to continue.</p>
            
            <div id="alert-container"></div>
            
            <form id="reset-form">
                <!-- Hidden username field for accessibility/password managers -->
                <input type="text" id="username_hidden" style="display:none;" autocomplete="username">
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="new_password" style="display: block; margin-bottom: 8px; font-weight: 600; color: #444;">New Password</label>
                    <input type="password" name="new_password" id="new_password" class="form-control" required placeholder="Enter New Password" autocomplete="new-password" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
                </div>
                
                <div class="form-group" style="margin-bottom: 25px;">
                    <label for="confirm_password" style="display: block; margin-bottom: 8px; font-weight: 600; color: #444;">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" required placeholder="Confirm New Password" autocomplete="new-password" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
                </div>
                
                <button type="submit" class="btn-login" style="width: 100%; padding: 14px; background-color: var(--primary-color, #003366); color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s;">Reset Password</button>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('reset-form');
            const token = localStorage.getItem('infotess_token');
            if (!token) {
                window.location.href = '../login.html';
                return;
            }
            
            // Populate hidden username field from localStorage
            try {
                const user = JSON.parse(localStorage.getItem('infotess_user') || '{}');
                const username = user.index_number || user.email;
                if (username) {
                    document.getElementById('username_hidden').value = username;
                }
            } catch (e) {
                console.error('Error parsing user info:', e);
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(form);
                const data = {
                    new_password: formData.get('new_password'),
                    confirm_password: formData.get('confirm_password')
                };

                const headers = { 'Content-Type': 'application/json' };
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                fetch('/api/auth/password_reset', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data)
                })
                .then(async (res) => {
                    const raw = await res.text();
                    let parsed = {};
                    try {
                        parsed = raw ? JSON.parse(raw) : {};
                    } catch (e) {
                        throw new Error('Server returned an invalid response format.');
                    }
                    if (!res.ok) {
                        throw new Error(parsed.error || parsed.message || `Request failed with status ${res.status}.`);
                    }
                    return parsed;
                })
                .then(res => {
                    const alertContainer = document.getElementById('alert-container');
                    const payloadData = res && res.data ? res.data : res;
                    if (payloadData.ok || res.success) {
                        alertContainer.innerHTML = `<div class="alert alert-success">${payloadData.message || res.message || 'Password reset successfully!'} Redirecting to profile setup...</div>`;
                        setTimeout(() => {
                            window.location.href = 'profile.html';
                        }, 2000);
                    } else {
                        alertContainer.innerHTML = `<div class="alert alert-danger">${payloadData.error || res.error || 'Password reset failed.'}</div>`;
                    }
                })
                .catch(err => {
                    console.error('Error reset:', err);
                    document.getElementById('alert-container').innerHTML = `<div class="alert alert-danger">${err.message || 'An error occurred. Please try again later.'}</div>`;
                });
            });
        });
    </script>
</body>
</html>
