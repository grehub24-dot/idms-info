<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects & Innovations - INFOTESS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="hero" style="height: 50vh;">
        <h1>Projects & Innovations</h1>
        <p>Showcase of student projects and department innovations.</p>
    </div>

    <div class="section">
        <div class="container">
            <div class="card-grid" id="projects-container">
                <p style="text-align: center; width: 100%;">Loading projects...</p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('api/public/projects.php')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('projects-container');
                    if (data.ok && data.projects && data.projects.length > 0) {
                        let html = '';
                        data.projects.forEach(project => {
                            let statusColor = '#17a2b8';
                            if (project.status === 'completed') statusColor = '#28a745';
                            else if (project.status === 'ongoing') statusColor = '#ffc107';

                            let imgHtml = '';
                            if (project.image_url) {
                                imgHtml = `<img src="${project.image_url.replace(/"/g, '&quot;')}" alt="${project.title.replace(/"/g, '&quot;')}" style="width: 100%; height: 200px; object-fit: cover;">`;
                            }

                            const dateObj = new Date(project.project_date);
                            const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                            html += `
                                <div class="card">
                                    ${imgHtml}
                                    <div class="card-content">
                                        <span class="badge" style="background: ${statusColor}; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem;">
                                            ${project.status.charAt(0).toUpperCase() + project.status.slice(1)}
                                        </span>
                                        <h3 class="card-title" style="margin-top: 10px;">${project.title.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</h3>
                                        <p>${(project.description || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>
                                        <p style="margin-top: 10px;"><small><i class="fas fa-calendar"></i> ${formattedDate}</small></p>
                                    </div>
                                </div>
                            `;
                        });
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = '<p style="text-align: center; width: 100%;">Project showcase is being updated. Check back soon!</p>';
                    }
                })
                .catch(err => {
                    document.getElementById('projects-container').innerHTML = '<p style="text-align: center; width: 100%;">Error loading projects.</p>';
                });
        });
    </script>
</body>
</html>
